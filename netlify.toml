[build]
  command = "echo 'Static site - no build required'"
  publish = "."

# Form handling configuration
[[forms]]
  name = "contact"
  # Email notifications
  [[forms.notification]]
    provider = "email"
    recipients = ["twomeycarpentry1@gmail.com"]

# Environment variables for email service
[context.production.environment]
  EMAIL_SERVICE = "gmail"
  # EMAIL_USER and EMAIL_PASSWORD should be set in Netlify dashboard

# Redirect all form submissions
[[redirects]]
  from = "/"
  to = "/"
  status = 200
  force = false

# Cache settings
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
